spring:
  application:
    name: cinema

  datasource:
    url: jdbc:postgresql://localhost:5432/cinema_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

cinema:
  time-zone: Asia/Ho_Chi_Minh
  booking:
    hold-duration: 10m

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 900000 # 15 phút